apiVersion: v1
kind: ConfigMap
metadata:
  name: message-router-config
  namespace: message-router
data:
  sites.json: |
    {
      "client-a-prod": {
        "recipient": "owner@client-a.com",
        "subject": "New Lead from Client A",
        "allowed_origins": ["https://client-a.com"]
      },
      "my-portfolio": {
        "recipient": "me@gmail.com",
        "subject": "Portfolio Contact",
        "allowed_origins": ["https://my-site.dev", "http://localhost:3000"]
      }
    }
