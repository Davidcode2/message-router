apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-router
  namespace: message-router
  labels:
    app: message-router
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: message-router
  template:
    metadata:
      labels:
        app: message-router
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: message-router
          image: ghcr.io/davidcode2/message-router:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOST
              value: "0.0.0.0"
            - name: CONFIG_PATH
              value: "/app/config/sites.json"
            - name: LOG_LEVEL
              value: "info"
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: message-router-secrets
                  key: RESEND_API_KEY
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: message-router-secrets
                  key: API_KEY
                  optional: true
            - name: FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: message-router-secrets
                  key: FROM_EMAIL
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: message-router-config
            items:
              - key: sites.json
                path: sites.json
